<!DOCTYPE html>
<html lang="fr">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Litematic Viewer 3D</title>

      <!-- Deepslate -->
      <script src="lib/deepslate.js"></script>
      <script src="lib/gl-matrix-min.js"></script>

      <script src="resource/assets.js"></script>
      <script src="resource/opaque.js"></script>

      <style>
         :root { color-scheme: dark; }
         * { box-sizing: border-box; }
         html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #06080f; color: #f1f1f1; font-family: 'Segoe UI', Arial, sans-serif; }
         button, input { font: inherit; }
         #viewer { position: fixed; inset: 0; background: #06080f; }
         #upload-overlay, #loading-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(4,6,15,0.92); z-index: 20; padding: 20px; text-align: center; }
         #upload-overlay.hidden, #loading-overlay.hidden { display: none; }
         .panel { width: min(520px,100%); background: rgba(10,14,30,0.96); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; box-shadow: 0 0 0 1px rgba(255,255,255,0.03); }
         .panel h1 { margin: 0 0 16px; font-size: 1.2rem; letter-spacing: 0.04em; }
         .button { background: #2f7fe7; color: white; border: none; border-radius: 8px; padding: 12px 18px; cursor: pointer; transition: transform 0.1s ease; }
         .button:hover { transform: translateY(-1px); }
         .button.secondary { background: #4caf50; }
         .button.link { background: transparent; color: #8ab4f8; border: 1px solid rgba(138,180,248,0.4); }
         .field { margin-top: 16px; }
         .field input { width: 100%; border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; padding: 10px 12px; background: rgba(255,255,255,0.04); color: #fff; }
         .field label { display: block; margin-bottom: 8px; font-size: 0.92rem; color: #b8c4d2; }
         .button-row { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:16px; }
         .note-text { margin-top:18px; color:#9db5ff; font-size:0.92rem; }
         .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }
         #loading-overlay .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.16); border-top-color: #64b5f6; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
         @keyframes spin { to { transform: rotate(360deg); } }
         #loading-overlay .loading-text { margin-top: 12px; color: #8ab4f8; }
         #main-content { position: relative; z-index: 10; }
         #sliders { position: fixed; right: 12px; top: 12px; display: none; flex-direction: column; gap: 12px; padding: 12px; background: rgba(10,14,30,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
         #sliders.show { display: flex; }
         #sliders label { font-size: 0.85rem; color: #cfd8fc; }
         #sliders input[type=range] { width: 200px; }
         #materialListButton { position: fixed; top: 12px; left: 12px; display: none; z-index: 15; }
         #materialList { position: fixed; top: 56px; left: 12px; max-height: 70vh; overflow-y: auto; display: none; padding: 12px; background: rgba(10,14,30,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; width: min(260px,calc(100vw - 32px)); color: #e8eaf6; z-index: 15; }
         #materialList .count-item { display: flex; justify-content: space-between; gap: 12px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.9rem; }
      </style>

      <script src="src/deepslate-helpers.js"></script>
      <script src="src/litematic-utils.js"></script>
      <script src="src/main.js"></script>
      <script src="src/viewer.js"></script>
   </head>

   <body>

      <div id="viewer"></div>

      <div id="upload-overlay" class="panel" ondrop="dropHandler(event)" ondragover="dragOverHandler(event)">
         <h1>Litematic Viewer 3D</h1>
         <p>Glisse ou sélectionne un fichier <code>.litematic</code> pour générer la scène 3D.</p>
         <div class="field">
            <label for="file-upload" class="visually-hidden">Sélectionner un fichier</label>
            <input id="file-upload" type="file" onchange="showLoading(); readFileInput(this)" accept=".litematic" />
         </div>
         <div class="field">
            <label for="remote-url">Ou charge depuis une URL</label>
            <input id="remote-url" type="text" placeholder="https://.../schematic.litematic" />
         </div>
         <div class="button-row">
            <button class="button secondary" onclick="document.getElementById('file-upload').click()">Ouvrir un fichier</button>
            <button class="button" onclick="submitFileLink(document.getElementById('remote-url').value)">Charger URL</button>
         </div>
         <p class="note-text">Utilise le moteur Deepslate pour la génération 3D. L&apos;interface reste simple.</p>
      </div>

      <div id="loading-overlay" class="hidden">
         <div>
            <div class="spinner"></div>
            <div class="loading-text">CHARGEMENT...</div>
         </div>
      </div>

      <div id="sliders"></div>
      <button id="materialListButton" hidden class="button link">Matériaux</button>
      <div id="materialList"></div>

      <div id="main-content"></div>

      <img id="atlas" src="resource/atlas.png" alt="Texture atlas" crossorigin="anonymous" hidden>

      <script>
         document.addEventListener("DOMContentLoaded", function() {
            const image = document.getElementById('atlas');
            if (image.complete) {
               loadDeepslateResources(image);
            } else {
               image.addEventListener('load', () => loadDeepslateResources(image));
            }
            image.addEventListener('error', (error) => console.error('Error loading atlas:', error));

            const urlParams = new URLSearchParams(window.location.search);
            const remoteUrl = urlParams.get('remote-url');
            if (remoteUrl) {
               showLoading();
               submitFileLink(remoteUrl);
            }
         });

         function submitFileLink(url) {
            if (!url) return;
            showLoading();
            readFileURL(url);
         }

         function readFileInput(input) {
            if (!input || !input.files) return;
            for (let i = 0; i < input.files.length; i++) {
               loadAndProcessFile(input.files[i]);
            }
         }

         function showLoading() {
            document.getElementById('loading-overlay').classList.remove('hidden');
         }

         function hideLoading() {
            document.getElementById('loading-overlay').classList.add('hidden');
         }

         function readFileURL(url, useProxy = true) {
            const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
            const request = new XMLHttpRequest();
            request.responseType = 'blob';
            request.onreadystatechange = function () {
               if (request.readyState === XMLHttpRequest.DONE) {
                  hideLoading();
                  if (request.status === 200) {
                     loadAndProcessFile(request.response);
                  } else {
                     console.error('Error loading litematic', request.status, request.statusText);
                  }
               }
            };
            request.open('GET', proxyUrl, true);
            request.send();
         }

         function dragOverHandler(ev) {
            ev.preventDefault();
         }

         function dropHandler(ev) {
            ev.preventDefault();
            showLoading();
            if (ev.dataTransfer.items) {
               for (let i = 0; i < ev.dataTransfer.items.length; i++) {
                  if (ev.dataTransfer.items[i].kind === 'file') {
                     const file = ev.dataTransfer.items[i].getAsFile();
                     loadAndProcessFile(file);
                  }
               }
            } else {
               for (let i = 0; i < ev.dataTransfer.files.length; i++) {
                  loadAndProcessFile(ev.dataTransfer.files[i]);
               }
            }
         }
      </script>
   </body>
</html>
