<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Litematic Tools</title>
<script src="shared.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a1a;font-family:'VT323',monospace;color:#e0e0e0;min-height:100dvh;display:flex;flex-direction:column}
header{background:linear-gradient(180deg,#1a3a1a,#0d1f0d);border-bottom:3px solid #5D9E3F;padding:14px 16px;text-align:center}
header h1{font-family:'Press Start 2P',monospace;font-size:clamp(10px,3vw,16px);color:#FFD700;text-shadow:2px 2px 0 #000}
header p{color:#9dbf9e;font-size:clamp(14px,4vw,18px);margin-top:6px}
.container{max-width:480px;margin:0 auto;padding:20px 16px;flex:1}

.file-status{
  background:rgba(255,255,255,0.04);
  border:2px solid #333;
  border-radius:4px;
  padding:14px 16px;
  margin-bottom:20px;
  display:flex;align-items:center;gap:12px;
}
.file-status .icon{font-size:28px}
.file-status .info{flex:1}
.file-status .fname{font-family:'Press Start 2P',monospace;font-size:clamp(7px,2.2vw,10px);color:#FFD700;margin-bottom:4px;word-break:break-all}
.file-status .fsub{font-size:clamp(13px,3.5vw,16px);color:#666}

.upload-zone{
  border:3px dashed #5D9E3F;border-radius:6px;padding:24px 16px;
  text-align:center;cursor:pointer;position:relative;
  background:rgba(93,158,63,0.06);transition:background 0.2s;margin-bottom:20px;
}
.upload-zone:hover,.upload-zone.drag{background:rgba(93,158,63,0.16)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-zone .icon{font-size:40px;display:block;margin-bottom:8px}
.upload-zone h2{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2.8vw,12px);color:#5D9E3F;margin-bottom:6px}
.upload-zone p{font-size:clamp(14px,4vw,17px);color:#888}

.tools{display:flex;flex-direction:column;gap:10px}
.tool-btn{
  display:flex;align-items:center;gap:14px;
  background:rgba(255,255,255,0.04);
  border:2px solid #333;border-radius:6px;
  padding:14px 16px;cursor:pointer;
  text-decoration:none;color:#e0e0e0;
  transition:background 0.15s,border-color 0.15s;
}
.tool-btn:hover{background:rgba(255,255,255,0.09);border-color:#555}
.tool-btn.disabled{opacity:0.35;pointer-events:none}
.tool-btn .t-icon{font-size:32px;flex-shrink:0}
.tool-btn .t-info{}
.tool-btn .t-title{font-family:'Press Start 2P',monospace;font-size:clamp(8px,2.5vw,11px);color:#FFD700;margin-bottom:4px}
.tool-btn .t-desc{font-size:clamp(13px,3.8vw,17px);color:#888}

.tool-btn.green{border-color:#27ae60}
.tool-btn.green:hover{border-color:#2ecc71;background:rgba(39,174,96,0.1)}
.tool-btn.blue{border-color:#2980b9}
.tool-btn.blue:hover{border-color:#3498db;background:rgba(41,128,185,0.1)}

.repls-badge{
  margin-left:auto;background:#c0392b;color:#fff;
  font-family:'Press Start 2P',monospace;font-size:8px;
  padding:3px 7px;border-radius:3px;flex-shrink:0;
}

footer{padding:12px;text-align:center;font-size:13px;color:#333}
</style>
</head>
<body>
<header>
  <h1>LITEMATIC TOOLS</h1>
  <p>Analyseur et visualiseur</p>
</header>

<div class="container">

  <!-- File status -->
  <div class="file-status" id="fileStatus">
    <div class="icon">📦</div>
    <div class="info">
      <div class="fname" id="statusName">Aucun fichier charge</div>
      <div class="fsub" id="statusSub">Importe un .litematic ci-dessous</div>
    </div>
  </div>

  <!-- Upload -->
  <div class="upload-zone" id="dropZone">
    <input type="file" id="fileInput" accept=".litematic">
    <span class="icon">📂</span>
    <h2>CHARGER UN .LITEMATIC</h2>
    <p>Touche ou glisse un fichier ici</p>
  </div>

  <!-- Tools -->
  <div class="tools">
    <a href="litematic.html" class="tool-btn green disabled" id="btnList">
      <div class="t-icon">⛏</div>
      <div class="t-info">
        <div class="t-title">LISTE DES MATERIAUX</div>
        <div class="t-desc">Compter les blocs, remplacer</div>
      </div>
      <div class="repls-badge" id="replsBadge" style="display:none">0</div>
    </a>
    <a href="viewer.html" class="tool-btn blue disabled" id="btnViewer">
      <div class="t-icon">🔭</div>
      <div class="t-info">
        <div class="t-title">VIEWER 3D</div>
        <div class="t-desc">Visualiser en 3D avec textures</div>
      </div>
    </a>
  </div>

</div>

<footer>Tous les fichiers restent sur votre appareil</footer>

<script>
function updateUI() {
  const name = sharedGetName();
  const repls = sharedLoadReplacements();
  const replCount = Object.keys(repls).length;
  const hasFile = sharedHasFile();

  document.getElementById('statusName').textContent = name || 'Aucun fichier charge';
  document.getElementById('statusSub').textContent = hasFile
    ? (replCount > 0 ? replCount + ' remplacement(s) actif(s)' : 'Pret')
    : 'Importe un .litematic ci-dessous';

  document.getElementById('btnList').classList.toggle('disabled', !hasFile);
  document.getElementById('btnViewer').classList.toggle('disabled', !hasFile);

  const badge = document.getElementById('replsBadge');
  if (replCount > 0) {
    badge.style.display = 'block';
    badge.textContent = replCount;
  } else {
    badge.style.display = 'none';
  }
}

async function handleFile(file) {
  if (!file.name.endsWith('.litematic')) return;
  const buf = await file.arrayBuffer();
  sharedSaveFile(buf, file.name);
  updateUI();
  // Auto-navigate to list after short delay
  setTimeout(() => { window.location.href = 'litematic.html'; }, 400);
}

document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// Listen for changes from other tabs
window.addEventListener('storage', () => updateUI());
updateUI();
</script>
</body>
</html>
